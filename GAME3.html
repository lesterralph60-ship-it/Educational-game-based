<!DOCTYPE html>
<html>
<head>
    <title>Neon Mixed Quiz Game - Randomized</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: #0d0d0d;
            color: #00fff7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            background: #111;
            border: 2px solid #00fff7;
            border-radius: 20px;
            padding: 30px;
            width: 600px;
            text-align: center;
            box-shadow: 0 0 40px #00fff7, 0 0 80px #00fff7 inset;
        }

        h2 {
            margin-bottom: 15px;
            color: #00fff7;
            text-shadow: 0 0 10px #00fff7;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat {
            font-size: 18px;
            color: #fff;
        }

        #question {
            background: #111;
            border: 2px solid #00fff7;
            padding: 25px;
            border-radius: 15px;
            min-height: 80px;
            font-size: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #00fff7 inset;
        }

        button, input[type="text"] {
            padding: 12px 25px;
            margin: 10px;
            border: 2px solid #00fff7;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            background: transparent;
            color: #00fff7;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #00fff7;
            color: #111;
            box-shadow: 0 0 15px #00fff7, 0 0 30px #00fff7 inset;
        }

        input[type="text"] {
            width: 200px;
        }

        .feedback {
            margin-top: 15px;
            font-size: 18px;
            height: 24px;
            text-shadow: 0 0 5px #00fff7;
        }

        .restart-btn {
            border-color: #ff00ff;
            color: #ff00ff;
        }

        .restart-btn:hover {
            background: #ff00ff;
            color: #111;
            box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff inset;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h2>🌌 Neon Mixed Quiz Game</h2>

    <div class="stats">
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">Lives: <span id="lives">3</span></div>
        <div class="stat">Time: <span id="timer">15</span>s</div>
    </div>

    <div id="question">Click Start to Begin!</div>
    <div id="options"></div>

    <button class="restart-btn" onclick="startGame()">Start / Restart</button>
    <div class="feedback" id="feedback"></div>
</div>

<script>
const allQuestions = [
    {type: "tf", text: "HTML stands for HyperText Markup Language.", correct: true},
    {type: "mc", text: "Which SQL command retrieves data?", options: ["INSERT", "SELECT", "DELETE"], correct: "SELECT"},
    {type: "tf", text: "<title> belongs inside the body tag.", correct: false},
    {type: "mc", text: "Whats HTML standfor?", options: ["Hypertext Markup Language", "Hyper super market", "Hyperbole"], correct: "HyperText Markup Language"},
    {type: "fill", text: "CSS stands for _____ Style Sheets.", correct: "Cascading"},
    {type: "tf", text: "UPDATE modifies records in SQL.", correct: true},
    {type: "mc", text: "Which attribute specifies the source of an image in HTML?", options: ["href", "src", "link"], correct: "src"},
    {type: "fill", text: "SQL is used to manage _____.", correct: "databases"},
    {type: "tf", text: "DELETE removes records in SQL.", correct: true},
    {type: "mc", text: "Which SQL command deletes records from a table?", options: ["Select", "Delete", "Insert"], correct: "Delete"}
];

let questions = [];
let currentQuestion = 0;
let score = 0;
let lives = 3;
let timeLeft = 15;
let timerInterval;

// Shuffle array function
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startGame() {
    questions = shuffleArray([...allQuestions]); // Randomize question order
    currentQuestion = 0;
    score = 0;
    lives = 3;
    document.getElementById("score").innerText = score;
    document.getElementById("lives").innerText = lives;
    document.getElementById("feedback").innerText = "";
    nextQuestion();
}

function nextQuestion() {
    clearInterval(timerInterval);
    if (lives <= 0) {
        randomPenalty();
        return;
    }
    if (currentQuestion >= questions.length) {
        endGame();
        return;
    }

    const q = questions[currentQuestion];
    document.getElementById("question").innerText = q.text;
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    if (q.type === "tf") {
        optionsDiv.innerHTML = `
            <button onclick="answer(true)">True</button>
            <button onclick="answer(false)">False</button>
        `;
    } else if (q.type === "mc") {
        q.options.forEach(opt => {
            optionsDiv.innerHTML += <button onclick="answer('${opt}')">${opt}</button>;
        });
    } else if (q.type === "fill") {
        optionsDiv.innerHTML = `
            <input type="text" id="fillInput" placeholder="Type answer">
            <button onclick="answer(document.getElementById('fillInput').value)">Submit</button>
        `;
    }

    resetTimer();
}

function answer(choice) {
    clearInterval(timerInterval);
    if (lives <= 0) return;

    const q = questions[currentQuestion];
    let isCorrect = false;

    if (q.type === "fill") {
        isCorrect = choice.trim().toLowerCase() === q.correct.toLowerCase();
    } else {
        isCorrect = choice === q.correct;
    }

    if (isCorrect) {
        score++;
        document.getElementById("score").innerText = score;
        document.getElementById("feedback").innerText = "✅ Correct!";
    } else {
        lives--;
        document.getElementById("lives").innerText = lives;
        document.getElementById("feedback").innerText = "❌ Wrong!";
    }

    currentQuestion++;
    setTimeout(nextQuestion, 800);
}

function resetTimer() {
    timeLeft = 15;
    document.getElementById("timer").innerText = timeLeft;
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            lives--;
            document.getElementById("lives").innerText = lives;
            currentQuestion++;
            nextQuestion();
        }
    }, 1000);
}

function randomPenalty() {
    score = Math.floor(Math.random() * 21); // Score becomes random 0-20
    document.getElementById("score").innerText = score;
    document.getElementById("question").innerText = "💥 All lives lost! Score randomized!";
    document.getElementById("options").innerHTML = "";
    document.getElementById("feedback").innerText = "Click Restart to try again!";
}

function endGame() {
    clearInterval(timerInterval);
    document.getElementById("question").innerText = 
        "🎉 Game Completed! Final Score: " + score + " / " + questions.length;
    document.getElementById("options").innerHTML = "";
    document.getElementById("feedback").innerText = "Click Restart to play again!";
}
</script>

</body>
</html>
