<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GameZone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f0f1a;
            color: white;
        }

        header {
            background: #1a1a2e;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #00f5ff;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00f5ff;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(to right, #141e30, #243b55);
        }

        .hero h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero a {
            padding: 12px 25px;
            font-size: 18px;
            background: #00f5ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .hero a:hover {
            background: #00bcd4;
        }

        .games {
            padding: 50px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #1f1f3a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .game-card:hover {
            transform: scale(1.05);
            background: #292950;
        }

        .game-card img {
            width: 100%;
            border-radius: 10px;
        }

        .game-card h3 {
            margin: 15px 0;
        }

        .game-card a {
            padding: 8px 15px;
            background: #00f5ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        footer {
            background: #1a1a2e;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>GameZone 🎮</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to GameZone</h2>
    <p>Play the best online games for free!</p>
    <br>
    <button onclick="showMessage()">Start Playing</button>
</section>

<section class="games">
    <div class="game-card">
        <img src="https://via.placeholder.com/300x200" alt="Game 1">
        <h3>Ultimate Guess The Word</h3>
        <a href="GAME1.html">Play</a>
    </div>

    <div class="game-card">
        <img src="https://via.placeholder.com/300x200" alt="Game 2">
        <h3>Ultimate Mixed Grammar</h3>
        <a href="GAME2.html">Play</a>
    </div>

    <div class="game-card">
        <img src="https://via.placeholder.com/300x200" alt="Game 3">
        <h3>Ultimate Smart Quiz</h3>
        <a href="GAME4.html">Play</a>
    </div>
</section>

<footer>
    <p>© 2026 GameZone. All rights reserved.</p>
</footer>

<script>
    function showMessage() {
        alert("Let the games begin! 🎮");
    }

    function playGame(gameName) {
        alert("Launching " + gameName + "...");
    }
</script>

</body>
</html>
